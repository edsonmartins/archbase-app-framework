name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Pre-cleanup workspace (self-hosted)
        run: |
          # Limpar workspace anterior para self-hosted runner
          cd ${{ github.workspace }} 2>/dev/null || true
          rm -rf * .[!.]* 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          clean: true

      - name: Setup JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Maven
        uses: stCarolas/setup-maven@07fbbe97d97ef44336b7382563d66743297e442f # v4.5
        with:
          maven-version: '3.9.9'

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in pom.xml
        run: |
          mvn versions:set -DnewVersion=${{ steps.get_version.outputs.VERSION }}

      - name: Configure GPG
        run: |
          # Limpar configuração GPG anterior (self-hosted runner)
          gpgconf --kill gpg-agent 2>/dev/null || true
          rm -rf ~/.gnupg

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          chmod 600 ~/.gnupg/gpg.conf ~/.gnupg/gpg-agent.conf

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode > /tmp/private_key.asc
          gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --import /tmp/private_key.asc
          rm -f /tmp/private_key.asc

          # Verificar se a chave foi importada corretamente
          echo "=== Chaves GPG importadas ==="
          gpg --list-keys
          gpg --list-secret-keys

          # Verificar validade da chave
          echo "=== Verificando validade da chave ==="
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          if [ -n "$KEY_ID" ]; then
            echo "Key ID: $KEY_ID"
            gpg --list-keys "$KEY_ID" 2>&1 | grep -E "(expires|expired)" || echo "Sem informação de expiração"
          else
            echo "ERRO: Nenhuma chave secreta encontrada!"
            exit 1
          fi

      - name: Build and Publish to Maven Central
        run: |
          mvn clean deploy -Pmaven-central -DskipTests \
            -s .maven-settings.xml.template
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body: |
            ## 🚀 Archbase Framework v${{ steps.get_version.outputs.VERSION }}

            ### What's New
            - Upgrade to Spring Boot 4.1, Hibernate 7 and Jackson 3
            - Java 25 required
            - Enable Virtual Threads: `spring.threads.virtual.enabled=true`

            ### Módulos publicados

            - archbase-starter
            - archbase-starter-core
            - archbase-starter-security
            - archbase-starter-multitenancy
            - archbase-domain-driven-design
            - archbase-domain-driven-design-spec
            - archbase-query
            - archbase-security
            - archbase-multitenancy
            - archbase-event-driven
            - archbase-event-driven-spec
            - archbase-workflow-process
            - archbase-plugin-manager
            - archbase-validation
            - archbase-validation-ddd-model
            - archbase-error-handling
            - archbase-transformation
            - archbase-resource-logger
            - archbase-shared-kernel
            - archbase-architecture
            - archbase-architecture-rules
            - archbase-hypersistence
            - archbase-starter-hypersistence
            - archbase-codegen-maven-plugin
            - archbase-annotation-processor
            - archbase-semver-implementation

            ### Installation

            ```xml
            <dependency>
                <groupId>br.com.archbase</groupId>
                <artifactId>archbase-starter</artifactId>
                <version>${{ steps.get_version.outputs.VERSION }}</version>
            </dependency>
            ```

            ### Documentation

            Visit [https://java.archbase.dev](https://java.archbase.dev) for full documentation.

            ### Migration from v1.x

            See [V1 branch](https://github.com/edsonmartins/archbase-app-framework/tree/V1) for version 1.x documentation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger docs deployment
        run: |
          echo "Documentation will be deployed automatically by workflow_run trigger"

      - name: Cleanup system caches
        if: always()
        run: |
          # Limpar cache do Maven local (manter últimos 7 dias)
          find ~/.m2/repository -type f -mtime +7 -delete 2>/dev/null || true

          # Docker system prune
          docker system prune -f

          # Exibir uso de disco
          echo "=== Uso de disco após limpeza ==="
          df -h /
